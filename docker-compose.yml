# mri_transfer Docker
#
# docker-compose.yml 만으로는 부족합니다. 함께 필요한 것:
#   - Dockerfile (이미지 빌드)
#   - docker-entrypoint.sh
#   - requirements.txt
#   - MRI/혀 메시 데이터 (/data 마운트, docker.env.example 참고)
#
# 최초 빌드 (ArtiSynth clone+compile, 수 분):
#   docker compose build
#
# 셸:
#   docker compose run --rm shell
#
# 파이프라인 (MRI 마스크 + tongue OBJ 가 /data 에 있어야 retarget 가능):
#   docker compose run --rm pipeline
#   docker compose run --rm pipeline stage=fem
#   docker compose run --rm pipeline stage=retarget artisynth.nramp=40
#
# 경로: 프로젝트 루트에 .env 생성 (docker.env.example 참고)

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ${PROJECT_DIR:-.}:/app
    - ${DATA_DIR:-./data}:/data:ro
  environment: &env
    ARTISYNTH_HOME: /opt/artisynth/artisynth_core
    PYTHONPATH: /app
    JVM_XMX: ${JVM_XMX:-4g}
    TONGUE_OBJ: ${TONGUE_OBJ:-/data/tongue_model/tongue_rest_m.obj}
    MRI_MASK_DIR: ${MRI_MASK_DIR:-/data/datasets/GT_Segmentations/Subject3}
    MRI_REST_MASK: ${MRI_REST_MASK:-/data/datasets/GT_Segmentations/Subject3/mask_1.mat}
    MRI_TARGET_MASK: ${MRI_TARGET_MASK:-/data/datasets/GT_Segmentations/Subject3/mask_51.mat}
    PIPELINE_ARGS: ${PIPELINE_ARGS:-}
  working_dir: /app
  stdin_open: true
  tty: true

services:
  shell:
    <<: *common
    command: ["bash"]

  pipeline:
    <<: *common
    command:
      - bash
      - -lc
      - >
        xvfb-run -a python main.py
        paths.tongue_obj="$$TONGUE_OBJ"
        paths.mask_dir="$$MRI_MASK_DIR"
        paths.rest_mask="$$MRI_REST_MASK"
        paths.target_mask="$$MRI_TARGET_MASK"
        $$PIPELINE_ARGS
