# mri_transfer Docker
#
# Build once:
#   docker compose build
#
# Persistent dev container (stop/start, keep your shell history & edits):
#   docker compose up -d workspace
#   docker compose exec workspace bash
#   docker compose stop workspace
#   docker compose start workspace
#   docker compose down          # remove container (bind mounts stay on host)
#
# One-shot pipeline (optional):
#   docker compose run --rm pipeline
#   docker compose run --rm -e PIPELINE_ARGS="stage=fem" pipeline
#
# Inside the running workspace:
#   ./datasets/dataset_download.sh
#   xvfb-run -a python main.py stage=fem
#
# Paths: copy docker.env.example → .env

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ${PROJECT_DIR:-.}:/workspace
    - ${DATA_DIR:-./datasets}:/workspace/datasets:ro
  environment: &env
    ARTISYNTH_HOME: /opt/artisynth/artisynth_core
    PYTHONPATH: /workspace
    JVM_XMX: ${JVM_XMX:-4g}
    TONGUE_OBJ: ${TONGUE_OBJ:-/workspace/datasets/tongue_model/tongue_rest_m.obj}
    MRI_MASK_DIR: ${MRI_MASK_DIR:-/workspace/datasets/GT_Segmentations/Subject3}
    MRI_REST_MASK: ${MRI_REST_MASK:-/workspace/datasets/GT_Segmentations/Subject3/mask_1.mat}
    MRI_TARGET_MASK: ${MRI_TARGET_MASK:-/workspace/datasets/GT_Segmentations/Subject3/mask_51.mat}
    PIPELINE_ARGS: ${PIPELINE_ARGS:-}
  working_dir: /workspace
  stdin_open: true
  tty: true

services:
  # Long-lived container — use exec bash to work inside after stop/start.
  workspace:
    <<: *common
    container_name: mri_transfer_workspace
    command: ["sleep", "infinity"]
    restart: unless-stopped

  # Ephemeral run (same image, removed after exit).
  pipeline:
    <<: *common
    profiles: ["run"]
    command:
      - bash
      - -lc
      - >
        xvfb-run -a python main.py
        paths.tongue_obj="$$TONGUE_OBJ"
        paths.mask_dir="$$MRI_MASK_DIR"
        paths.rest_mask="$$MRI_REST_MASK"
        paths.target_mask="$$MRI_TARGET_MASK"
        $$PIPELINE_ARGS
