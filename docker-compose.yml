# mri_transfer Docker
#
# Naming (see docker.env.example):
#   project   mri_transfer          (Compose group / Docker Desktop folder)
#   image     mri_transfer/workspace:latest
#   container mri_transfer_workspace  (persistent dev container)
#
# Build once:
#   docker compose build
#
# Persistent dev container:
#   docker compose up -d workspace
#   docker compose exec workspace bash
#   docker compose stop workspace
#   docker compose start workspace
#   docker compose down
#
# One-shot pipeline:
#   docker compose --profile run run --rm -e PIPELINE_ARGS="stage=fem" pipeline

name: mri_transfer

x-common: &common
  image: mri_transfer/workspace:latest
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ${PROJECT_DIR:-.}:/workspace
    - ${DATA_DIR:-./datasets}:/workspace/datasets:ro
  environment: &env
    ARTISYNTH_HOME: /opt/artisynth/artisynth_core
    PYTHONPATH: /workspace
    JVM_XMX: ${JVM_XMX:-4g}
    TONGUE_OBJ: ${TONGUE_OBJ:-/workspace/datasets/tongue_model/tongue_rest_m.obj}
    MRI_MASK_DIR: ${MRI_MASK_DIR:-/workspace/datasets/GT_Segmentations/Subject3}
    MRI_REST_MASK: ${MRI_REST_MASK:-/workspace/datasets/GT_Segmentations/Subject3/mask_1.mat}
    MRI_TARGET_MASK: ${MRI_TARGET_MASK:-/workspace/datasets/GT_Segmentations/Subject3/mask_51.mat}
    PIPELINE_ARGS: ${PIPELINE_ARGS:-}
  working_dir: /workspace
  stdin_open: true
  tty: true

services:
  workspace:
    <<: *common
    container_name: mri_transfer_workspace
    command: ["sleep", "infinity"]
    restart: unless-stopped

  pipeline:
    <<: *common
    profiles: ["run"]
    command:
      - bash
      - -lc
      - >
        xvfb-run -a python main.py
        paths.tongue_obj="$$TONGUE_OBJ"
        paths.mask_dir="$$MRI_MASK_DIR"
        paths.rest_mask="$$MRI_REST_MASK"
        paths.target_mask="$$MRI_TARGET_MASK"
        $$PIPELINE_ARGS
